name: Release
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
   release:
     runs-on: ubuntu-latest
     env:
       MISE_ENV: ci
     steps:
       - name: Checkout code
         uses: actions/checkout@v6
       - name: Enable Mise
         uses: jdx/mise-action@v4
         with:
           install: true
           experimental: true
           cache: true
